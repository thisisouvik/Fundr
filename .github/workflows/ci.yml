name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # LTS version
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Type Check & Build
        run: npm run build
        env:
          # Next.js requires NEXT_PUBLIC variables at build time. 
          # You can define real ones in GitHub Actions Secrets.
          # These are fallbacks to ensure the build doesn't crash.
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: https://mock.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: mock-key
          NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
          NEXT_PUBLIC_STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_FACTORY_CONTRACT_ID: mock-contract
          NEXT_PUBLIC_CAMPAIGN_CONTRACT_ID: mock-contract
          NEXT_PUBLIC_ADMIN_WALLET_ID: mock-admin-wallet

  # Optional: Uncomment below to run Playwright E2E tests
